<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URBANOPOLY</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
background:linear-gradient(135deg,#00c6ff,#0072ff);
display:flex;
justify-content:center;
}

.wrapper{
width:100%;
max-width:1200px;
height:100vh;
display:flex;
flex-direction:column;
}

.titulo{
text-align:center;
font-size:28px;
font-weight:bold;
color:white;
padding:10px;
text-shadow:2px 2px #000;
}

.container{
flex:1;
display:flex;
gap:10px;
padding:10px;
}

.board{
flex:2;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
}

.casa{
background:#fff;
border-radius:12px;
padding:6px;
text-align:center;
font-size:13px;
font-weight:bold;
box-shadow:0 4px #999;
}

.preservacao{background:#b8f0b0;}
.invasao{background:#ffb3b3;}
.regular{background:#b3dcff;}
.especial{background:#ffe066;}

.pino{font-size:18px;}

.panel{
flex:1;
background:white;
border-radius:15px;
padding:15px;
display:flex;
flex-direction:column;
gap:12px;
}

.btn{
background:#00c853;
color:white;
border:none;
padding:15px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:#fff176;
padding:25px;
border-radius:20px;
width:90%;
max-width:500px;
text-align:center;
}

.opcao{
background:#ff9800;
margin:6px;
padding:12px;
border-radius:10px;
cursor:pointer;
color:white;
font-weight:bold;
}

.feedback{
margin-top:10px;
font-weight:bold;
}

#btnContinuar{
display:none;
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
background:#00c853;
color:white;
font-weight:bold;
cursor:pointer;
}

@media(max-width:768px){
.container{flex-direction:column;}
.board{grid-template-columns:repeat(4,1fr);}
}
</style>
</head>

<body>

<div class="wrapper">

<div class="titulo">🌆 URBANOPOLY 🎲</div>

<div class="container">

<div class="board" id="board"></div>

<div class="panel">
<div>🔵 Jogador 1: <span id="p1">0</span></div>
<div>🔴 Jogador 2: <span id="p2">0</span></div>

<button id="btnJogar" class="btn">🎲 Jogar (ENTER)</button>

<div id="log">Pressione ENTER ou clique em jogar</div>
</div>

</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<div id="pergunta"></div>
<div id="opcoes"></div>
<div id="feedback" class="feedback"></div>
<button id="btnContinuar">CONTINUAR ▶</button>
</div>
</div>

<script>

/* ===== TODAS AS PERGUNTAS ===== */
const basePerguntas = [

{
pergunta:"O que é uma ocupação?",
opcoes:[
"Pessoas construindo casas sem autorização em área protegida",
"Uma festa na rua",
"Um time de futebol",
"Plantar árvores"
],
correta:0,
explicacao:"Ocupação é quando famílias ocupam áreas que não são delas."
},

{
pergunta:"Por que as famílias ocupam terrenos?",
opcoes:[
"Porque não têm dinheiro para comprar uma casa",
"Porque gostam de morar no mato",
"Para criar animais",
"Para fazer plantação"
],
correta:0,
explicacao:"Muitas famílias não têm onde morar."
},

{
pergunta:"O que é uma ÁREA DE PRESERVAÇÃO?",
opcoes:[
"Lugar onde não se pode construir",
"Um estacionamento",
"Um shopping",
"Uma rua"
],
correta:0,
explicacao:"São áreas protegidas para a natureza."
},

/* ===== NOVAS ===== */

{
pergunta:"Qual profissional orienta calçadas drenantes?",
opcoes:[
"Engenheiro ambiental ou urbanista",
"Cabeleireiro",
"Vendedor",
"Jogador"
],
correta:0,
explicacao:"Ajuda a evitar enchentes."
},

{
pergunta:"Quem trabalha com energia do vento?",
opcoes:[
"Técnico em energia eólica",
"Garçom",
"Motorista",
"Dentista"
],
correta:0,
explicacao:"Produz energia limpa."
},

{
pergunta:"Quem ajuda a limpar rios poluídos?",
opcoes:[
"Engenheiro ambiental ou biólogo",
"Padeiro",
"Carteiro",
"Ator"
],
correta:0,
explicacao:"Recupera rios."
},

{
pergunta:"Quem ensina reciclagem?",
opcoes:[
"Educador ambiental",
"Vendedor",
"Cabeleireiro",
"Jogador"
],
correta:0,
explicacao:"Ensina separar lixo."
},

{
pergunta:"Quem instala luz automática?",
opcoes:[
"Eletricista automação",
"Professor",
"Cozinheiro",
"Motorista"
],
correta:0,
explicacao:"Economiza energia."
},

{
pergunta:"Quem fiscaliza áreas verdes?",
opcoes:[
"Fiscal ambiental",
"Dançarino",
"Vendedor",
"Carteiro"
],
correta:0,
explicacao:"Protege natureza."
},

{
pergunta:"Quem poda árvores perto de fios?",
opcoes:[
"Técnico especializado",
"Padeiro",
"Jogador",
"Garçom"
],
correta:0,
explicacao:"Evita acidentes."
},

{
pergunta:"Qual benefício plantar árvores?",
opcoes:[
"Selo verde ou IPTU menor",
"Multa",
"Aumento imposto",
"RG"
],
correta:0,
explicacao:"Incentivo sustentável."
},

{
pergunta:"Quem planeja rede elétrica sustentável?",
opcoes:[
"Engenheiro eletricista ambiental",
"Cabeleireiro",
"Vendedor",
"Motorista"
],
correta:0,
explicacao:"Protege o ambiente."
},

{
pergunta:"Quem cria captação de chuva?",
opcoes:[
"Engenheiro hidráulico",
"Padeiro",
"Jogador",
"Dentista"
],
correta:0,
explicacao:"Economiza água."
},

{
pergunta:"Quem fiscaliza poluição da água?",
opcoes:[
"Fiscal hídrico",
"Carteiro",
"Garçom",
"Ator"
],
correta:0,
explicacao:"Protege rios."
},

{
pergunta:"Quem instala LED nas ruas?",
opcoes:[
"Técnico iluminação pública",
"Professor",
"Vendedor",
"Cabeleireiro"
],
correta:0,
explicacao:"Economiza energia."
}

];

/* ===== SISTEMA ===== */
let perguntasDisponiveis=[...basePerguntas];

function getPergunta(){
if(perguntasDisponiveis.length===0){
perguntasDisponiveis=[...basePerguntas];
}
let i=Math.floor(Math.random()*perguntasDisponiveis.length);
let p=perguntasDisponiveis[i];
perguntasDisponiveis.splice(i,1);
return p;
}

let jogadores=[{p:0,pts:0},{p:0,pts:0}];
let vez=0;
let esperando=false;

const btnContinuar=document.getElementById("btnContinuar");
const btnJogar=document.getElementById("btnJogar");

/* TABULEIRO */
const casas=Array.from({length:20},(_,i)=>({
tipo:["preservacao","invasao","regular","especial"][i%4]
}));

function desenhar(){
let b=document.getElementById("board");
b.innerHTML="";
casas.forEach((c,i)=>{
let d=document.createElement("div");
d.className="casa "+c.tipo;
d.innerHTML="Casa "+(i+1);

jogadores.forEach((j,idx)=>{
if(j.p===i){
d.innerHTML+=`<div class="pino">${idx===0?"🔵":"🔴"}</div>`;
}
});

b.appendChild(d);
});
}
desenhar();

/* ROLAR */
function rolar(){
if(esperando) return;

let d=Math.floor(Math.random()*6)+1;
let j=jogadores[vez];

j.p+=d;
if(j.p>=19) j.p=19;

document.getElementById("log").innerText=
`Jogador ${vez+1} tirou ${d}`;

desenhar();
mostrarPergunta();
}

/* PERGUNTA */
function mostrarPergunta(){
let q=getPergunta();

modal.style.display="flex";
pergunta.innerText=q.pergunta;

opcoes.innerHTML="";
feedback.innerText="";
btnContinuar.style.display="none";

q.opcoes.forEach((txt,i)=>{
let btn=document.createElement("div");
btn.className="opcao";
btn.innerText=txt;

btn.onclick=()=>{
if(i===q.correta){
feedback.innerText="✅ "+q.explicacao;
jogadores[vez].pts+=10;
}else{
feedback.innerText="❌ "+q.explicacao;
jogadores[vez].pts-=5;
}

p1.innerText=jogadores[0].pts;
p2.innerText=jogadores[1].pts;

esperando=true;
btnContinuar.style.display="block";
};

opcoes.appendChild(btn);
});
}

/* CONTINUAR */
function continuar(){
modal.style.display="none";
vez=vez===0?1:0;
esperando=false;
}

btnContinuar.onclick=continuar;

/* ENTER */
document.addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
if(esperando){
continuar();
}else{
rolar();
}
}
});

/* BOTÃO */
btnJogar.onclick=rolar;

</script>

</body>
</html>
