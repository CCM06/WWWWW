<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URBANOPOLY</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(135deg,#00c6ff,#0072ff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:95%;
max-width:600px;
background:white;
border-radius:20px;
padding:25px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.titulo{
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

.pontos{
font-size:18px;
margin-bottom:15px;
}

.pergunta{
font-size:22px;
font-weight:bold;
margin-bottom:20px;
}

.opcao{
background:#ff9800;
color:white;
padding:12px;
margin:8px 0;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

.opcao:hover{
background:#e68900;
}

.feedback{
margin-top:15px;
font-size:18px;
font-weight:bold;
}

.explicacao{
margin-top:10px;
font-size:16px;
}

.botao{
margin-top:20px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
background:#00c853;
color:white;
font-size:18px;
cursor:pointer;
display:none;
}

@media(max-width:500px){
.pergunta{font-size:18px;}
}
</style>
</head>

<body>

<div class="container">

<div class="titulo">🌆 URBANOPOLY QUIZ</div>

<div class="pontos">Pontuação: <span id="pontos">0</span></div>

<div class="pergunta" id="pergunta"></div>

<div id="opcoes"></div>

<div class="feedback" id="feedback"></div>
<div class="explicacao" id="explicacao"></div>

<button class="botao" id="btnProx">CONTINUAR ▶</button>

</div>

<script>

/* ===== PERGUNTAS ===== */
const perguntas = [

{
pergunta:"O que é uma ocupação?",
opcoes:[
"Pessoas construindo casas sem autorização",
"Uma festa",
"Um time",
"Plantar árvores"
],
correta:0,
explicacao:"Ocupação é quando pessoas usam um terreno sem autorização."
},

{
pergunta:"Por que algumas famílias vão morar em novos lugares da cidade?",
opcoes:[
"Porque estão procurando um lugar melhor para morar",
"Porque gostam de morar no mato",
"Para criar animais",
"Para plantar"
],
correta:0,
explicacao:"As famílias buscam conforto e segurança."
},

{
pergunta:"O que é uma área de preservação?",
opcoes:[
"Lugar protegido da natureza",
"Shopping",
"Rua",
"Estacionamento"
],
correta:0,
explicacao:"São áreas que devemos cuidar."
},

{
pergunta:"Quem ensina reciclagem?",
opcoes:[
"Educador ambiental",
"Cabeleireiro",
"Jogador",
"Vendedor"
],
correta:0,
explicacao:"Ensina cuidar do planeta."
},

{
pergunta:"Quem trabalha com energia do vento?",
opcoes:[
"Técnico em energia eólica",
"Garçom",
"Motorista",
"Dentista"
],
correta:0,
explicacao:"Produz energia limpa."
},

{
pergunta:"Quem ajuda a limpar rios?",
opcoes:[
"Engenheiro ambiental ou biólogo",
"Padeiro",
"Carteiro",
"Ator"
],
correta:0,
explicacao:"Recupera rios."
},

{
pergunta:"Quem instala luz automática?",
opcoes:[
"Eletricista",
"Professor",
"Cozinheiro",
"Motorista"
],
correta:0,
explicacao:"Ajuda a economizar energia."
},

{
pergunta:"Quem fiscaliza áreas verdes?",
opcoes:[
"Fiscal ambiental",
"Dançarino",
"Vendedor",
"Carteiro"
],
correta:0,
explicacao:"Protege a natureza."
},

{
pergunta:"Quem cria captação de chuva?",
opcoes:[
"Engenheiro hidráulico",
"Padeiro",
"Jogador",
"Dentista"
],
correta:0,
explicacao:"Ajuda a economizar água."
}

];

/* ===== SISTEMA ===== */

let lista=[...perguntas];
let pontos=0;

function embaralhar(q){
let ops=q.opcoes.map((o,i)=>({t:o,c:i===q.correta}));

for(let i=ops.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[ops[i],ops[j]]=[ops[j],ops[i]];
}

return{
pergunta:q.pergunta,
opcoes:ops.map(o=>o.t),
correta:ops.findIndex(o=>o.c),
explicacao:q.explicacao
};
}

function novaPergunta(){

if(lista.length===0){
lista=[...perguntas];
}

let i=Math.floor(Math.random()*lista.length);
let q=embaralhar(lista[i]);
lista.splice(i,1);

pergunta.innerText=q.pergunta;
opcoes.innerHTML="";
feedback.innerText="";
explicacao.innerText="";
btnProx.style.display="none";

q.opcoes.forEach((txt,idx)=>{
let div=document.createElement("div");
div.className="opcao";
div.innerText=txt;

div.onclick=()=>{
if(idx===q.correta){
feedback.innerText="✅ Acertou!";
pontos+=10;
}else{
feedback.innerText="❌ Errou!";
pontos-=5;
}

explicacao.innerText=q.explicacao;
pontosEl.innerText=pontos;
btnProx.style.display="block";
};

opcoes.appendChild(div);
});
}

btnProx.onclick=novaPergunta;

/* ENTER */
document.addEventListener("keydown",(e)=>{
if(e.key==="Enter" && btnProx.style.display==="block"){
novaPergunta();
}
});

const pergunta=document.getElementById("pergunta");
const opcoes=document.getElementById("opcoes");
const feedback=document.getElementById("feedback");
const explicacao=document.getElementById("explicacao");
const btnProx=document.getElementById("btnProx");
const pontosEl=document.getElementById("pontos");

/* INICIAR */
novaPergunta();

</script>

</body>
</html>
